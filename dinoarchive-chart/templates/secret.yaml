apiVersion: v1
kind: Secret
metadata:
  name: dinoarchive-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password }}
  SECRET_KEY: {{ .Values.backend.secretKey }}
  SMTP_USER: {{ .Values.smtp.user }}
  SMTP_PASSWORD: {{ .Values.smtp.password }}
